<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#04081a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root {
  --bg: #04081a;
  --bg2: #080d1e;
  --pink: #ff2d78;
  --rosa: #ffb3c6;
  --rot: #e8002a;
  --orange: #ff7f2a;
  --pink2: #ff5a3d;
  --text: #ebebee;
  --text-dim: rgba(235,235,238,0.75);
  --text-sub: rgba(235,235,238,0.75);
  --darkviolet: #4a0080;
  --midpurple: #7b2fff;
  --lightpink: #ff6ec7;
  --lightcyan: #00c9ff;

  --cat-warm-1: #ffb3c6;
  --cat-warm-2: #ff2d78;
  --cat-warm-3: #e8002a;
  --cat-warm-4: #ff7f2a;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

/* GRAIN OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* SCREENS */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  overflow-y: auto;
  overflow-x: hidden;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}





/* BACK BUTTON */
.back-btn {
  position: fixed;
  top: 1.2rem;
  left: 1.2rem;
  z-index: 999;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  width: 2.2rem;
  height: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 0.85rem;
  transition: all 0.3s;
  opacity: 0;
  pointer-events: none;
  color: rgba(255,255,255,0.45);
}
.back-btn.visible { opacity: 1; pointer-events: all; }
.back-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.8); }

/* ===== START SCREEN ===== */
#screen-start {
  gap: 3rem;
}

.logo-area {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
}

.logo-title-canvas {
  width: 320px;
  height: 52px;
  display: block;
}

.logo-sub {
  font-size: 0.85rem;
  letter-spacing: 0.08em;
  color: rgba(235,235,238,0.65);
  font-weight: 300;
  font-style: italic;
  text-align: center;
}

.start-symbol {
  display: block;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.start-choices {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  width: 100%;
  max-width: 320px;
}

.choice-btn {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 4px;
  padding: 1rem 1.4rem;
  color: var(--text);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
  position: relative;
  overflow: hidden;
}



.choice-btn .choice-label {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.choice-btn .choice-desc {
  font-size: 0.82rem;
  color: rgba(235,235,238,0.75);
  font-weight: 300;
  line-height: 1.5;
}

.choice-btn.yes-no { border-color: #ffb3c6; }
.choice-btn.yes-no .choice-label { color: #ffb3c6; }
.choice-btn.oracle { border-color: #ff7f2a; }
.choice-btn.oracle .choice-label { color: #ff7f2a; }
.choice-btn.grid-btn { border-color: #e8002a; }
.choice-btn.grid-btn .choice-label { color: #e8002a; }
.choice-btn.grid-btn:hover { box-shadow: 0 8px 30px rgba(232,0,42,0.2); }

.choice-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.choice-btn.yes-no:hover { box-shadow: 0 8px 30px rgba(255,179,198,0.2); }
.choice-btn.oracle:hover { box-shadow: 0 8px 30px rgba(255,127,42,0.2); }

/* FAV BUTTON on start */
.fav-entry {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text-dim);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  transition: color 0.3s;
}
.fav-entry:hover { color: rgba(255,127,42,0.9); }

/* ===== YES/NO SCREEN ===== */
#screen-yesno {
  gap: 2.5rem;
}

.screen-title {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-align: center;
}

.yesno-instruction {
  text-align: center;
  max-width: 280px;
  line-height: 1.7;
  color: rgba(235,235,238,0.75);
  font-size: 0.9rem;
  font-weight: 300;
}

.pulse-btn {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 2px solid #ff2d78;
  background: rgba(255,45,120,0.05);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: all 0.3s;
  animation: pulse-ring 3s ease-in-out infinite;
}

.pulse-btn::before, .pulse-btn::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  border: 1px solid var(--pink);
  animation: pulse-expand 3s ease-out infinite;
}
.pulse-btn::before { inset: -15px; opacity: 0.4; }
.pulse-btn::after { inset: -30px; opacity: 0.2; animation-delay: 0.5s; }

@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 20px rgba(255,45,120,0.2); }
  50% { box-shadow: 0 0 40px rgba(255,45,120,0.4); }
}

@keyframes pulse-expand {
  0% { transform: scale(1); opacity: 0.4; }
  100% { transform: scale(1.3); opacity: 0; }
}

.pulse-btn:active {
  transform: scale(0.95);
  background: rgba(255,45,120,0.15);
}

.pulse-btn-inner {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--pink);
}

/* ===== CATEGORIES SCREEN ===== */
#screen-categories {
  justify-content: flex-start;
  padding-top: 5rem;
  gap: 1.5rem;
}

.cat-list {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
  width: 100%;
  max-width: 360px;
  overflow-y: auto;
  max-height: calc(100vh - 10rem);
  padding-bottom: 1rem;
}

.cat-card {
  border-radius: 4px;
  border: 1px solid;
  background: rgba(255,255,255,0.02);
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  padding: 0.75rem 1.1rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, box-shadow 0.3s;
}



.cat-card:hover {
  transform: translateY(-3px);
}
.cat-card:active { transform: scale(0.97); }

.cat-card span {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  line-height: 1.3;
  position: relative;
  z-index: 1;
  color: rgba(235,235,238,0.92);
  text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

/* ===== ANSWER SCREEN ===== */
#screen-answer {
  gap: 2rem;
}

.answer-symbol-wrap {
  width: 160px;
  height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.8s ease, filter 0.8s ease;
}
.answer-symbol-wrap svg {
  width: 140px;
  height: 140px;
  display: block;
}
.answer-symbol-wrap.revealed {
  opacity: 1;
  animation: glow-symbol 2s ease-in-out infinite alternate;
}

@keyframes glow-symbol {
  from { filter: drop-shadow(0 0 8px rgba(255,45,120,0.4)); }
  to { filter: drop-shadow(0 0 20px rgba(255,127,42,0.5)); }
}

.answer-text {
  max-width: 320px;
  text-align: center;
  line-height: 1.85;
  font-size: 0.95rem;
  font-weight: 300;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  color: rgba(235,235,238,0.75);
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.8s ease 0.4s, transform 0.8s ease 0.4s;
}
.answer-text.revealed {
  opacity: 1;
  transform: translateY(0);
}

.answer-category {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-dim);
  opacity: 0;
  transition: opacity 0.8s ease 0.8s;
}
.answer-category.revealed { opacity: 1; }

.answer-actions {
  display: flex;
  gap: 1.5rem;
  opacity: 0;
  transition: opacity 0.8s ease 1s;
}
.answer-actions.revealed { opacity: 1; }

.action-btn {
  background: none;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 3px;
  padding: 0.6rem 1.2rem;
  color: var(--text-dim);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.3s;
}
.action-btn:hover { border-color: #ff7f2a; color: #ff7f2a; }
.action-btn.fav-active { border-color: #ff7f2a; color: #ff7f2a; }

/* FLASH ANIMATION */
@keyframes flash-reveal {
  0% { opacity: 0; }
  30% { opacity: 1; filter: brightness(2); }
  60% { opacity: 1; filter: brightness(1.3); }
  100% { opacity: 1; filter: brightness(1); }
}

.flash { animation: flash-reveal 0.6s ease forwards; }

/* ===== FAVORITES SCREEN ===== */
#screen-favorites {
  justify-content: flex-start;
  padding-top: 5rem;
  gap: 1rem;
}

.fav-list {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
  overflow-y: auto;
  max-height: calc(100vh - 8rem);
  padding-bottom: 2rem;
}

.fav-item {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 1rem 1.2rem;
  position: relative;
}

.fav-item-text {
  font-size: 0.88rem;
  line-height: 1.65;
  font-weight: 300;
  color: rgba(235,235,238,0.75);
}

.fav-item-meta {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-top: 0.5rem;
}

.fav-remove {
  position: absolute;
  top: 0.8rem;
  right: 0.8rem;
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 0.8rem;
  transition: color 0.3s;
}
.fav-remove:hover { color: var(--pink); }

.empty-state {
  text-align: center;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 300;
  font-style: italic;
  margin-top: 3rem;
}

/* YESNO ANSWER special */
.yesno-verdict {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.yesno-verdict.revealed { opacity: 1; }
.yesno-verdict.ja { color: #ff7f2a; }
.yesno-verdict.nein { color: #ff2d78; }


/* EYE BLINK */
@keyframes blink {
  0%, 45%, 55%, 100% { d: path("M10 40 Q60 5 110 40 Q60 75 10 40Z"); }
  50% { d: path("M10 40 Q60 36 110 40 Q60 44 10 40Z"); }
}
@keyframes blink-outline {
  0%, 45%, 55%, 100% { d: path("M10 40 Q60 5 110 40 Q60 75 10 40Z"); }
  50% { d: path("M10 40 Q60 36 110 40 Q60 44 10 40Z"); }
}
@keyframes iris-hide {
  0%, 40%, 60%, 100% { opacity: 1; }
  50% { opacity: 0; }
}


/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<button class="back-btn" id="back-btn">←</button>

<!-- SCREEN: START -->
<div class="screen active" id="screen-start">
  <div class="logo-area">
    <canvas id="eye-canvas" class="start-symbol"></canvas>
    <svg class="start-symbol-hidden" id="eye-svg" style="display:none;" viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="eyeGrad" x1="0" y1="0" x2="120" y2="80">
          <stop offset="0%" stop-color="#ff2d78"/>
          <stop offset="50%" stop-color="#bf5fff"/>
          <stop offset="100%" stop-color="#00f0ff"/>
        </linearGradient>
        <clipPath id="eyeClip">
          <path id="eye-shape" d="M10 40 Q60 5 110 40 Q60 75 10 40Z"/>
        </clipPath>
      </defs>
      <!-- outer glow lines -->
      <path d="M5 40 Q60 0 115 40 Q60 80 5 40Z" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.3"/>
      <!-- main eye outline -->
      <path id="eye-outline" d="M10 40 Q60 5 110 40 Q60 75 10 40Z" stroke="url(#eyeGrad)" stroke-width="1.5" fill="none"/>
      <!-- iris -->
      <circle id="eye-iris" cx="60" cy="40" r="18" stroke="url(#eyeGrad)" stroke-width="1.2" fill="none"/>
      <!-- iris detail rings -->
      <circle cx="60" cy="40" r="13" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.5"/>
      <circle cx="60" cy="40" r="8" stroke="url(#eyeGrad)" stroke-width="0.5" fill="none" opacity="0.4"/>
      <!-- pupil -->
      <circle id="eye-pupil" cx="60" cy="40" r="7" fill="url(#eyeGrad)" opacity="0.9"/>
      <!-- pupil highlight -->
      <circle cx="63" cy="37" r="2" fill="rgba(255,255,255,0.4)"/>
      <!-- lash lines top -->
      <line x1="60" y1="5" x2="60" y2="0" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.5"/>
      <line x1="40" y1="10" x2="37" y2="5" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.4"/>
      <line x1="80" y1="10" x2="83" y2="5" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.4"/>
      <!-- lash lines bottom -->
      <line x1="60" y1="75" x2="60" y2="80" stroke="url(#eyeGrad)" stroke-width="1" opacity="0.3"/>
    </svg>
    <canvas id="title-canvas" class="logo-title-canvas"></canvas>
    <div class="logo-sub">Orakel vom Rand unserer Galaxie</div>
  </div>

  <div class="start-choices">
    <button class="choice-btn yes-no" onclick="goTo('yesno')">
      <div class="choice-label">Ja oder Nein</div>
      <div class="choice-desc">Halte deine Frage im Kopf. L3-PT antwortet.</div>
    </button>
    <button class="choice-btn oracle" onclick="goTo('categories')">
      <div class="choice-label">Orakelspruch</div>
      <div class="choice-desc">Wähle ein Thema. Lass dich führen.</div>
    </button>
    <button class="choice-btn grid-btn" onclick="goTo('grid')">
      <div class="choice-label">Grid</div>
      <div class="choice-desc">Welches Wort zieht dich an?</div>
    </button>
  </div>

  <button class="fav-entry" onclick="goTo('favorites')">✦ Favoriten</button>
</div>

<!-- SCREEN: YES/NO -->
<div class="screen" id="screen-yesno">
  <div class="screen-title">Ja oder Nein</div>
  <div class="yesno-instruction">Formuliere deine Frage klar.<br>Halte sie in Gedanken.<br>Wenn sie klar ist tippe.</div>
  <button class="pulse-btn" onclick="answerYesNo()" id="pulse-btn">
    <span class="pulse-btn-inner">Tippe</span>
  </button>
</div>

<!-- SCREEN: CATEGORIES -->
<div class="screen" id="screen-categories">
  <div class="screen-title">Wähle dein Thema</div>
  <div class="cat-list" id="cat-grid"></div>
</div>

<!-- SCREEN: ANSWER -->
<div class="screen" id="screen-answer">
  <div class="answer-category" id="answer-category"></div>
  <div class="yesno-verdict" id="yesno-verdict"></div>
  <div class="answer-symbol-wrap" id="answer-symbol"></div>
  <div class="answer-text" id="answer-text"></div>
  <div class="answer-actions">
    <button class="action-btn" id="fav-btn" onclick="toggleFavorite()">♡ Merken</button>
    <button class="action-btn" onclick="goBack()">← Zurück</button>
  </div>
</div>

<!-- SCREEN: GRID -->
<div class="screen" id="screen-grid">
  <div class="screen-title" style="color:rgba(235,235,238,0.85);font-size:0.65rem;max-width:300px;text-align:center;line-height:1.6;letter-spacing:0.08em;text-transform:none;margin-bottom:1.5rem;">Das erste Wort das du findest ist eine Botschaft von dir an dich selbst</div>
  <canvas id="grid-canvas" style="display:block;cursor:pointer;touch-action:none;"></canvas>
  <div id="grid-found" style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:0.85rem;font-weight:300;color:rgba(235,235,238,0.75);text-align:center;min-height:2.5rem;max-width:300px;line-height:1.6;padding:0 1rem;"></div>
</div>

<!-- SCREEN: FAVORITES -->
<div class="screen" id="screen-favorites">
  <div class="screen-title">Favoriten</div>
  <div class="fav-list" id="fav-list"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================

const SENTENCES = [

  { text: "Du vergleichst dein Innenleben mit dem Außenbild von anderen. Das ist kein fairer Vergleich.", cat: [4] },

// Warm gradient: rosa → pink → rot → orange
function getCatColor(i, total) {
  const warmColors = [[255,179,198],[255,90,61],[232,0,42],[255,127,42]];
  const t = i / (total - 1);
  const scaled = t * (warmColors.length - 1);
  const idx = Math.floor(scaled);
  const frac = scaled - idx;
  const c1 = warmColors[Math.min(idx, warmColors.length-1)];
  const c2 = warmColors[Math.min(idx+1, warmColors.length-1)];
  const r = Math.round(c1[0]+(c2[0]-c1[0])*frac);
  const g = Math.round(c1[1]+(c2[1]-c1[1])*frac);
  const b = Math.round(c1[2]+(c2[2]-c1[2])*frac);
  return `rgb(${r},${g},${b})`;
}

let currentScreen = 'start';
let currentAnswer = null;
let favorites = JSON.parse(localStorage.getItem('uschi-favs') || '[]');


// ============================================================
// NAVIGATION
// ============================================================
function goTo(screen) {
  document.getElementById('screen-' + currentScreen).classList.remove('active');
  document.getElementById('screen-' + screen).classList.add('active');
  currentScreen = screen;

  const backBtn = document.getElementById('back-btn');
  if (screen === 'start') {
    backBtn.classList.remove('visible');
  } else {
    backBtn.classList.add('visible');
  }

  if (screen === 'favorites') renderFavorites();
  if (screen === 'grid') initGrid();
}

function goBack() {
  if (currentScreen === 'answer') {
    goTo('start');
  } else {
    goTo('start');
  }
}

document.getElementById('back-btn').onclick = goBack;

const grid = document.getElementById('cat-grid');
CATEGORIES.forEach((cat, i) => {
  const col = getCatColor(i, CATEGORIES.length);
  const card = document.createElement('div');
  card.className = 'cat-card';

});

// ============================================================
// SHOW ANSWER
// ============================================================
function getRandomSymbol() {
  return Math.floor(Math.random() * SYMBOLS.length);
}

function showAnswer(catIndex) {
  const isRandom = catIndex === 8;
  let pool;
  if (isRandom) {
    pool = SENTENCES;
  } else {
    pool = SENTENCES.filter(s => s.cat.includes(catIndex));
    if (pool.length === 0) pool = SENTENCES;
  }

  const sentence = pool[Math.floor(Math.random() * pool.length)];
  const symbolIndex = getRandomSymbol();
  const warmPalette = ['#ffb3c6','#ff2d78','#e8002a','#ff7f2a','#ff5a3d'];
  const color = warmPalette[Math.floor(Math.random()*warmPalette.length)];

  currentAnswer = {
    text: sentence.text,
    cat: isRandom ? 'Zufall' : CATEGORIES[catIndex].name,
    symbolIndex,
    color,
    type: 'oracle'
  };

  renderAnswerScreen(false);
  goTo('answer');
  revealAnswer();
}

function answerYesNo() {
  const yn = YESNO[Math.floor(Math.random() * YESNO.length)];
  const symbolIndex = getRandomSymbol();
  const color = yn.verdict === 'Ja' ? '#ff7f2a' : '#ff2d78';

  currentAnswer = {
    text: yn.text,
    verdict: yn.verdict,
    cat: 'Ja / Nein',
    symbolIndex,
    color,
    type: 'yesno'
  };

  renderAnswerScreen(true);
  goTo('answer');
  revealAnswer();
}

function renderAnswerScreen(isYesNo) {
  const symWrap = document.getElementById('answer-symbol');
  const ansText = document.getElementById('answer-text');
  const ansCat = document.getElementById('answer-category');
  const verdict = document.getElementById('yesno-verdict');
  const favBtn = document.getElementById('fav-btn');
  const actions = document.querySelector('.answer-actions');

  // Reset
  symWrap.classList.remove('revealed');
  ansText.classList.remove('revealed');
  ansCat.classList.remove('revealed');
  actions.classList.remove('revealed');
  verdict.classList.remove('revealed', 'ja', 'nein');

  symWrap.style.color = currentAnswer.color;
  symWrap.innerHTML = SYMBOLS[currentAnswer.symbolIndex];
  ansText.textContent = currentAnswer.text;
  ansCat.textContent = currentAnswer.cat;

  if (isYesNo) {
    verdict.textContent = currentAnswer.verdict;
    verdict.classList.add(currentAnswer.verdict === 'Ja' ? 'ja' : 'nein');
    verdict.style.display = 'block';
  } else {
    verdict.style.display = 'none';
  }

  // Favorite state
  const isFav = favorites.some(f => f.text === currentAnswer.text);
  favBtn.textContent = isFav ? '♥ Gemerkt' : '♡ Merken';
  favBtn.classList.toggle('fav-active', isFav);
}

function revealAnswer() {
  setTimeout(() => {
    document.getElementById('answer-symbol').classList.add('revealed', 'flash');
  }, 100);
  setTimeout(() => {
    document.getElementById('answer-text').classList.add('revealed');
  }, 400);
  setTimeout(() => {
    document.getElementById('answer-category').classList.add('revealed');
  }, 700);
  setTimeout(() => {
    if (currentAnswer.type === 'yesno') document.getElementById('yesno-verdict').classList.add('revealed');
    document.querySelector('.answer-actions').classList.add('revealed');
  }, 900);
}

// ============================================================
// FAVORITES
// ============================================================
function toggleFavorite() {
  const favBtn = document.getElementById('fav-btn');
  const idx = favorites.findIndex(f => f.text === currentAnswer.text);
  if (idx > -1) {
    favorites.splice(idx, 1);
    favBtn.textContent = '♡ Merken';
    favBtn.classList.remove('fav-active');
  } else {
    favorites.push({ text: currentAnswer.text, cat: currentAnswer.cat, date: new Date().toLocaleDateString('de-AT') });
    favBtn.textContent = '♥ Gemerkt';
    favBtn.classList.add('fav-active');
  }
  localStorage.setItem('uschi-favs', JSON.stringify(favorites));
}

function renderFavorites() {
  const list = document.getElementById('fav-list');
  if (favorites.length === 0) {
    list.innerHTML = '<div class="empty-state">Noch keine Favoriten gespeichert.</div>';
    return;
  }
  list.innerHTML = favorites.map((f, i) => `
    <div class="fav-item">
      <div class="fav-item-text">${f.text}</div>
      <div class="fav-item-meta">${f.cat} · ${f.date}</div>
      <button class="fav-remove" onclick="removeFav(${i})">✕</button>
    </div>
  `).join('');
}

function removeFav(i) {
  favorites.splice(i, 1);
  localStorage.setItem('uschi-favs', JSON.stringify(favorites));
  renderFavorites();
}

let gridCurrentPuzzle = null;
let gridGrid = [];
let gridWordPositions = {};
let gridFoundWords = new Set();
let gridSelecting = false;
let gridStartCell = null;
let gridSelectedCells = [];
let gridAnimFrame = null;

function initGrid() {
  const canvas = document.getElementById('grid-canvas');
  if (!canvas) return;

  const SIZE = 10;
  const maxW = Math.min(window.innerWidth - 60, 360);
  const CELL = Math.floor(maxW / SIZE);
  canvas.width = SIZE * CELL;
  canvas.height = SIZE * CELL;
  canvas.style.width = (SIZE * CELL) + 'px';
  canvas.style.height = (SIZE * CELL) + 'px';

  // Pick random puzzle
  gridCurrentPuzzle = GRID_PUZZLES[Math.floor(Math.random() * GRID_PUZZLES.length)];
  gridGrid = Array.from({length:SIZE}, () => Array(SIZE).fill(''));
  gridWordPositions = {};
  gridFoundWords = new Set();
  gridSelectedCells = [];
  document.getElementById('grid-found').textContent = '';

  const letters = 'ABCDEFGHIJKLMNOPRSTUVWXZ';
  gridCurrentPuzzle.words.forEach(w => {
    gridWordPositions[w] = placeGridWord(w, gridGrid, SIZE);
  });
  for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
    if(gridGrid[r][c]==='') gridGrid[r][c]=letters[Math.floor(Math.random()*letters.length)];
  }

  if(gridAnimFrame) cancelAnimationFrame(gridAnimFrame);

  const ctx = canvas.getContext('2d');

  function lerp(a,b,t){return a+(b-a)*t;}
  function getWarmColor(t){
    const stops=[[255,179,198],[255,90,140],[255,45,120],[245,30,60],[232,0,42],[255,60,10],[255,127,42],[255,160,80],[255,179,198]];
    const scaled=t*(stops.length-1);
    const idx=Math.floor(scaled),frac=scaled-idx;
    const c1=stops[Math.min(idx,stops.length-1)];
    const c2=stops[Math.min(idx+1,stops.length-1)];
    return[lerp(c1[0],c2[0],frac),lerp(c1[1],c2[1],frac),lerp(c1[2],c2[2],frac)];
  }

  function drawG(time) {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t = time/9000;
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const x=c*CELL,y=r*CELL;
        const diagOffset=((r+c)/(SIZE*1.6));
        const phase=diagOffset*Math.PI*2+t*Math.PI*2;
        const colorT=(((phase%(Math.PI*2))+Math.PI*2)%(Math.PI*2))/(Math.PI*2);
        const[cr,cg,cb]=getWarmColor(colorT);

        let inFW=false;
        for(const fw of gridFoundWords){
          if(gridWordPositions[fw]&&gridWordPositions[fw].some(p=>p.r===r&&p.c===c)){inFW=true;break;}
        }
        const inSel=gridSelectedCells.some(p=>p.r===r&&p.c===c);

        if(inFW){ctx.fillStyle=`rgba(${cr.toFixed(0)},${cg.toFixed(0)},${cb.toFixed(0)},0.2)`;ctx.fillRect(x+1,y+1,CELL-2,CELL-2);}
        else if(inSel){ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x+1,y+1,CELL-2,CELL-2);}

        const fontSize = Math.max(11, Math.floor(CELL * 0.38));
        ctx.font=`bold ${fontSize}px "Helvetica Neue",Helvetica,Arial,sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=1;

        if(inFW){ctx.fillStyle=`rgb(${cr.toFixed(0)},${cg.toFixed(0)},${cb.toFixed(0)})`;}
        else if(inSel){ctx.fillStyle='rgba(235,235,238,0.95)';}
        else{
          const alpha=0.7+0.25*((Math.sin(phase*0.3+1)+1)/2);
          ctx.fillStyle=`rgba(${cr.toFixed(0)},${cg.toFixed(0)},${cb.toFixed(0)},${alpha.toFixed(2)})`;
        }
        ctx.fillText(gridGrid[r][c],x+CELL/2,y+CELL/2);
      }
    }
    ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
    for(let i=0;i<=SIZE;i++){
      ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,SIZE*CELL);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(SIZE*CELL,i*CELL);ctx.stroke();
    }
    gridAnimFrame = requestAnimationFrame(drawG);
  }
  gridAnimFrame = requestAnimationFrame(drawG);

  // Events
  function getGridPos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;
    const touch=e.touches?e.touches[0]:e;
    const x=(touch.clientX-rect.left)*scaleX,y=(touch.clientY-rect.top)*scaleY;
    const c=Math.floor(x/CELL),r=Math.floor(y/CELL);
    if(r>=0&&r<SIZE&&c>=0&&c<SIZE) return{r,c};return null;
  }

  canvas.onmousedown = e=>{gridStartCell=getGridPos(e);gridSelecting=true;gridSelectedCells=gridStartCell?[gridStartCell]:[];};
  canvas.onmousemove = e=>{
    if(!gridSelecting||!gridStartCell) return;
    const cur=getGridPos(e);if(!cur||cur.r!==gridStartCell.r) return;
    const cells=[],start=Math.min(gridStartCell.c,cur.c),end=Math.max(gridStartCell.c,cur.c);
    for(let c=start;c<=end;c++) cells.push({r:gridStartCell.r,c});
    gridSelectedCells=cells;
  };
  canvas.onmouseup = e=>{
    if(!gridSelecting) return;gridSelecting=false;
    const word=gridSelectedCells.map(p=>gridGrid[p.r][p.c]).join('');
    if(gridCurrentPuzzle.words.includes(word)&&!gridFoundWords.has(word)){
      gridFoundWords.add(word);
      document.getElementById('grid-found').textContent=`${word} – ${gridCurrentPuzzle.meanings[word]}`;
    }
    gridSelectedCells=[];gridStartCell=null;
  };

  canvas.addEventListener('touchstart',e=>{e.preventDefault();gridStartCell=getGridPos(e);gridSelecting=true;gridSelectedCells=gridStartCell?[gridStartCell]:[];},{passive:false});
  canvas.addEventListener('touchmove',e=>{
    e.preventDefault();if(!gridSelecting||!gridStartCell) return;
    const cur=getGridPos(e);if(!cur||cur.r!==gridStartCell.r) return;
    const cells=[],start=Math.min(gridStartCell.c,cur.c),end=Math.max(gridStartCell.c,cur.c);
    for(let c=start;c<=end;c++) cells.push({r:gridStartCell.r,c});
    gridSelectedCells=cells;
  },{passive:false});
  canvas.addEventListener('touchend',e=>{
    e.preventDefault();if(!gridSelecting) return;gridSelecting=false;
    const word=gridSelectedCells.map(p=>gridGrid[p.r][p.c]).join('');
    if(gridCurrentPuzzle.words.includes(word)&&!gridFoundWords.has(word)){
      gridFoundWords.add(word);
      document.getElementById('grid-found').textContent=`${word} – ${gridCurrentPuzzle.meanings[word]}`;
    }
    gridSelectedCells=[];gridStartCell=null;
  },{passive:false});
}

function placeGridWord(word, grid, SIZE) {
  let tries=0;
  while(tries<200){
    const r=Math.floor(Math.random()*SIZE);
    const c=Math.floor(Math.random()*(SIZE-word.length+1));
    let positions=[],fits=true;
    for(let i=0;i<word.length;i++){
      if(grid[r][c+i]!==''&&grid[r][c+i]!==word[i]){fits=false;break;}
      positions.push({r,c:c+i});
    }
    if(fits){positions.forEach((p,i)=>grid[p.r][p.c]=word[i]);return positions;}
    tries++;
  }
  return null;
}

// EYE CANVAS (start screen)
// ============================================================
(function() {
  const ec = document.getElementById('eye-canvas');
  if (!ec) return;
  ec.width = 440; ec.height = 260;
  const c = ec.getContext('2d');
  const W=440,H=260,cx=220,cy=130,ew=176,eh=86;
  const eyeCY=cy-eh*0.125, irisR=eh*0.42;

  function egrad(x1,y1,x2,y2){
    const g=c.createLinearGradient(x1,y1,x2,y2);
    g.addColorStop(0,'#ffb3c6');g.addColorStop(0.35,'#ff2d78');
    g.addColorStop(0.7,'#e8002a');g.addColorStop(1,'#ff7f2a');
    return g;
  }
  function uc(t){const p0={x:cx-ew,y:cy},p1={x:cx-ew*0.4,y:cy-eh*1.15},p2={x:cx+ew*0.4,y:cy-eh*1.15},p3={x:cx+ew,y:cy};const mt=1-t;return{x:mt*mt*mt*p0.x+3*mt*mt*t*p1.x+3*mt*t*t*p2.x+t*t*t*p3.x,y:mt*mt*mt*p0.y+3*mt*mt*t*p1.y+3*mt*t*t*p2.y+t*t*t*p3.y};}
  function lc(t){const p0={x:cx-ew,y:cy},p1={x:cx-ew*0.4,y:cy+eh*0.9},p2={x:cx+ew*0.4,y:cy+eh*0.9},p3={x:cx+ew,y:cy};const mt=1-t;return{x:mt*mt*mt*p0.x+3*mt*mt*t*p1.x+3*mt*t*t*p2.x+t*t*t*p3.x,y:mt*mt*mt*p0.y+3*mt*mt*t*p1.y+3*mt*t*t*p2.y+t*t*t*p3.y};}
  function eclip(){c.beginPath();c.moveTo(cx-ew,cy);c.bezierCurveTo(cx-ew*0.4,cy-eh*1.15,cx+ew*0.4,cy-eh*1.15,cx+ew,cy);c.bezierCurveTo(cx+ew*0.4,cy+eh*0.9,cx-ew*0.4,cy+eh*0.9,cx-ew,cy);c.closePath();}

  function drawEye(blink){
    c.clearRect(0,0,W,H);c.save();eclip();c.clip();
    const ig=c.createRadialGradient(cx,eyeCY,2,cx,eyeCY,irisR);
    ig.addColorStop(0,'rgba(255,45,120,0.15)');ig.addColorStop(0.6,'rgba(232,0,42,0.08)');ig.addColorStop(1,'rgba(255,127,42,0.03)');
    c.beginPath();c.arc(cx,eyeCY,irisR,0,Math.PI*2);c.fillStyle=ig;c.fill();
    c.beginPath();c.arc(cx,eyeCY,irisR,0,Math.PI*2);c.strokeStyle=egrad(cx-irisR,eyeCY-irisR,cx+irisR,eyeCY+irisR);c.lineWidth=2.5;c.globalAlpha=0.75;c.stroke();
    [irisR*0.68,irisR*0.42].forEach(r=>{c.beginPath();c.arc(cx,eyeCY,r,0,Math.PI*2);c.strokeStyle=egrad(cx-r,eyeCY-r,cx+r,eyeCY+r);c.lineWidth=1.2;c.globalAlpha=0.35;c.stroke();});
    c.globalAlpha=1;const pupR=irisR*0.32;
    c.beginPath();c.arc(cx,eyeCY,pupR,0,Math.PI*2);c.fillStyle=egrad(cx-pupR,eyeCY-pupR,cx+pupR,eyeCY+pupR);c.fill();
    c.beginPath();c.arc(cx+pupR*0.4,eyeCY-pupR*0.4,pupR*0.25,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.4)';c.fill();
    const steps=80;
    c.beginPath();for(let i=0;i<=steps;i++){const t=i/steps,top=uc(t),bot=lc(t);const y=top.y+blink*(bot.y-top.y);i===0?c.moveTo(top.x,y):c.lineTo(top.x,y);}
    c.lineTo(cx+ew+20,cy-eh*2);c.lineTo(cx-ew-20,cy-eh*2);c.closePath();c.fillStyle='#04081a';c.fill();
    c.beginPath();for(let i=0;i<=steps;i++){const t=i/steps,top=uc(t),bot=lc(t);const y=top.y+blink*(bot.y-top.y);i===0?c.moveTo(top.x,y):c.lineTo(top.x,y);}
    c.strokeStyle=egrad(cx-ew,cy-eh,cx+ew,cy+eh);c.lineWidth=3;c.globalAlpha=1;c.stroke();
    c.restore();
    c.globalAlpha=1;eclip();c.strokeStyle=egrad(cx-ew,cy-eh,cx+ew,cy+eh);c.lineWidth=3;c.stroke();
    c.strokeStyle='rgba(255,127,42,0.08)';c.lineWidth=10;c.stroke();
  }
  let blink=0,closing=false,opening=false,elast=0;
  function eyeLoop(ts){
    if(!closing&&!opening&&ts-elast>4000){closing=true;elast=ts;}
    if(closing){blink+=0.07;if(blink>=1){blink=1;closing=false;opening=true;}}
    else if(opening){blink-=0.07;if(blink<=0){blink=0;opening=false;}}
    drawEye(blink);requestAnimationFrame(eyeLoop);
  }
  requestAnimationFrame(eyeLoop);
})();

// ============================================================
// TITLE WAVE CANVAS
// ============================================================
(function() {
  const tc = document.getElementById('title-canvas');
  if (!tc) return;
  tc.width = 640; tc.height = 104;
  const tctx = tc.getContext('2d');
  const TW=640,TH=104;
  const titleText='L3-PT';
  const warmColors=[[255,179,198],[255,45,120],[232,0,42],[255,127,42]];
  function lerp(a,b,t){return a+(b-a)*t;}
  function waveColor(i,total,time){
    const phase=(i/total)*Math.PI*2+time*1.2;
    const t=(Math.sin(phase)+1)/2;
    const scaled=t*(warmColors.length-1);
    const idx=Math.floor(scaled);const frac=scaled-idx;
    const c1=warmColors[Math.min(idx,warmColors.length-1)];
    const c2=warmColors[Math.min(idx+1,warmColors.length-1)];
    return`rgb(${Math.round(lerp(c1[0],c2[0],frac))},${Math.round(lerp(c1[1],c2[1],frac))},${Math.round(lerp(c1[2],c2[2],frac))})`;
  }
  function drawTitle(time){
    tctx.clearRect(0,0,TW,TH);
    tctx.font='bold 52px "Helvetica Neue",Helvetica,Arial,sans-serif';
    tctx.textBaseline='middle';
    const totalW=tctx.measureText(titleText).width;
    let x=(TW-totalW)/2;
    for(let i=0;i<titleText.length;i++){
      const ch=titleText[i];
      tctx.fillStyle=waveColor(i,titleText.length,time);
      tctx.fillText(ch,x,TH*0.55);
      x+=tctx.measureText(ch).width;
    }
  }
  function titleLoop(ts){drawTitle(ts/1000);requestAnimationFrame(titleLoop);}
  requestAnimationFrame(titleLoop);
})();
